<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Prop Edges — SportsEdgeBet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            line-height: 1.45;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 18px 48px; }

        header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        }

        header h1 {
            font-size: 1.55rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f8fafc;
        }

        header .subtitle { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .metric {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .metric .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
        .metric .value { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; margin-top: 4px; }

        .panel {
            background: #f8fafc;
            color: #0f172a;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }

        .panel-head {
            padding: 14px 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .controls {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .field { display: flex; flex-direction: column; gap: 4px; min-width: 160px; flex: 1 1 180px; }
        .field label { font-size: 0.75rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.04em; }

        select, input[type="text"] {
            padding: 9px 11px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            color: #0f172a;
            background: #fff;
        }

        select:focus, input:focus { outline: 2px solid #6366f1; outline-offset: 1px; }

        #gameFilter { font-weight: 600; }

        .matchup-banner {
            display: none;
            margin: 0 16px 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            color: #312e81;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .matchup-banner.visible { display: block; }

        table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
        thead th {
            text-align: left;
            padding: 10px 12px;
            background: #f1f5f9;
            color: #334155;
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        thead th.sortable::after { content: ' \2195'; opacity: 0.35; font-size: 0.65rem; }
        thead th.sorted-asc::after { content: ' \2191'; opacity: 1; }
        thead th.sorted-desc::after { content: ' \2193'; opacity: 1; }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        tbody tr:hover { background: #f8fafc; }

        .player-cell .name { font-weight: 600; color: #1e3a8a; }
        .player-cell .meta { font-size: 0.78rem; color: #64748b; margin-top: 2px; }

        .pick { font-weight: 600; color: #0f172a; }
        .pick.over { color: #15803d; }
        .pick.under { color: #b91c1c; }

        .prob { font-weight: 700; color: #4f46e5; }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-high { background: #dbeafe; color: #1d4ed8; }
        .badge-medium { background: #ffedd5; color: #c2410c; }
        .badge-low { background: #e2e8f0; color: #475569; }

        .muted { font-size: 0.78rem; color: #64748b; }

        .loading, .empty { text-align: center; padding: 28px 16px; color: #64748b; }
        .error { background: #fef2f2; color: #991b1b; padding: 14px; margin: 12px 16px; border-radius: 8px; font-size: 0.9rem; }

        .col-matchup { max-width: 200px; }

        @media (max-width: 720px) {
            .container { padding: 16px 12px 40px; }
            table { font-size: 0.8rem; }
            thead th, tbody td { padding: 8px 8px; }
            .hide-narrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MLB prop edges</h1>
            <p class="subtitle">Total bases, hits, and strikeouts — filtered by matchup</p>
        </header>

        <div class="metrics" id="modelInfo">
            <div class="metric">
                <div class="label">Model MAE</div>
                <div class="value" id="mae">—</div>
            </div>
            <div class="metric">
                <div class="label">Players (this view)</div>
                <div class="value" id="totalPlayers">—</div>
            </div>
            <div class="metric">
                <div class="label">High-confidence rows</div>
                <div class="value" id="highConfidence">—</div>
            </div>
            <div class="metric">
                <div class="label">Updated</div>
                <div class="value" id="lastUpdated">—</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">Pick a game</div>
            <div class="controls">
                <div class="control-row">
                    <div class="field" style="flex: 2 1 280px;">
                        <label for="gameFilter">Game</label>
                        <select id="gameFilter">
                            <option value="all">All games (full slate)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="confidenceFilter">Confidence</label>
                        <select id="confidenceFilter">
                            <option value="all">All</option>
                            <option value="high" selected>High+</option>
                            <option value="very-high">Very high</option>
                            <option value="medium">Medium+</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="betTypeFilter">Side</label>
                        <select id="betTypeFilter">
                            <option value="all">Over &amp; under</option>
                            <option value="over">Over only</option>
                            <option value="under">Under only</option>
                        </select>
                    </div>
                    <div class="field" style="flex: 2 1 220px;">
                        <label for="playerSearch">Search</label>
                        <input type="text" id="playerSearch" placeholder="Player name…" autocomplete="off">
                    </div>
                </div>
                <div id="matchupBanner" class="matchup-banner" role="status"></div>
            </div>

            <div class="panel-head">Best edges (this view)</div>
            <div style="overflow-x: auto;">
                <table id="bestBetsTable">
                    <thead>
                        <tr>
                            <th class="sortable col-matchup" data-sort="bet_matchup" id="thBetMatchup">Matchup</th>
                            <th class="sortable" data-sort="bet_player">Player</th>
                            <th class="sortable hide-narrow" data-sort="bet_opp">Opponent</th>
                            <th class="sortable" data-sort="bet_line">Pick</th>
                            <th class="sortable" data-sort="bet_probability">Win %</th>
                            <th class="sortable" data-sort="bet_confidence">Tier</th>
                        </tr>
                    </thead>
                    <tbody id="bestBetsBody">
                        <tr><td colspan="6" class="loading">Loading…</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="panel-head">Projections (this view)</div>
            <div style="overflow-x: auto;">
                <table id="predictionsTable">
                    <thead>
                        <tr>
                            <th class="sortable col-matchup" data-sort="matchup" id="thPredMatchup">Matchup</th>
                            <th class="sortable" data-sort="player_id">Player</th>
                            <th class="sortable hide-narrow" data-sort="opponent">vs</th>
                            <th class="sortable" data-sort="probability">Top edge</th>
                            <th class="sortable hide-narrow" data-sort="predicted_tb">TB</th>
                            <th class="sortable hide-narrow" data-sort="predicted_hits">H</th>
                            <th class="sortable hide-narrow" data-sort="predicted_k">K</th>
                        </tr>
                    </thead>
                    <tbody id="predictionsBody">
                        <tr><td colspan="7" class="loading">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    let allPredictions = [];
    let allBestBets = [];
    let gamesOnSlate = [];
    let totalPlayersInFile = 0;
    let sortBetsState = { column: 'bet_probability', direction: 'desc' };
    let sortPredState = { column: 'probability', direction: 'desc' };

    function escapeHtml(s) {
        if (s == null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function badgeClass(conf) {
        const c = (conf || '').toUpperCase();
        if (c.includes('HIGH')) return 'badge-high';
        if (c.includes('MEDIUM')) return 'badge-medium';
        return 'badge-low';
    }

    function getProjectionForBet(player, bet) {
        if (!player || !bet) return '—';
        if (bet.prop === 'Total Bases') return (player.total_bases?.predicted ?? 0).toFixed(2) + ' TB';
        if (bet.prop === 'Hits') return (player.hits?.predicted ?? 0).toFixed(2) + ' H';
        if (bet.prop === 'Strikeouts') return (player.strikeouts?.predicted ?? 0).toFixed(2) + ' K';
        return '—';
    }

    async function loadPredictions() {
        try {
            const response = await fetch('data/predictions.json');
            const data = await response.json();

            document.getElementById('mae').textContent = data.model_performance.mae.toFixed(3);
            totalPlayersInFile = data.total_players ?? 0;
            document.getElementById('lastUpdated').textContent = new Date(data.generated_at).toLocaleString();

            gamesOnSlate = Array.isArray(data.games) ? data.games : [];
            const gameSelect = document.getElementById('gameFilter');
            gameSelect.innerHTML = '<option value="all">All games (full slate)</option>';
            gamesOnSlate.forEach(g => {
                const opt = document.createElement('option');
                opt.value = String(g.game_id);
                opt.textContent = g.matchup || `${g.away_team} @ ${g.home_team}`;
                gameSelect.appendChild(opt);
            });
            if (gamesOnSlate.length > 0) {
                gameSelect.value = String(gamesOnSlate[0].game_id);
            } else {
                gameSelect.value = 'all';
            }

            const rawPlayers = data.all_predictions || [];
            allPredictions = rawPlayers.map(p => {
                const bets = Array.isArray(p.recommended_bets) ? p.recommended_bets : [];
                const primaryBet = bets.length
                    ? bets.reduce((best, b) => (b.prob > best.prob ? b : best), bets[0])
                    : { prop: 'None', line: 'No edge', confidence: 'LOW', prob: 50 };
                return {
                    ...p,
                    primaryBet,
                    recommendation: `${primaryBet.prop}: ${primaryBet.line}`,
                    confidence: primaryBet.confidence,
                    probability: primaryBet.prob
                };
            });

            allBestBets = [];
            for (const p of allPredictions) {
                const bets = Array.isArray(p.recommended_bets) ? p.recommended_bets : [];
                for (const b of bets) {
                    if (!b || b.confidence === 'LOW' || b.prop === 'None') continue;
                    allBestBets.push({
                        player_id: p.player_id,
                        player_name: p.player_name,
                        matchup: p.matchup,
                        team: p.matchup?.team || '',
                        opponent: p.matchup?.opponent || '',
                        matchup_label: p.matchup?.label || '',
                        game_id: p.matchup?.game_id,
                        prop: b.prop,
                        line: b.line,
                        confidence: b.confidence,
                        probability: typeof b.prob === 'number' ? b.prob : 50,
                        projection: getProjectionForBet(p, b)
                    });
                }
            }

            const highConfCount = allPredictions.filter(p => {
                const c = (p.confidence || '').toUpperCase();
                return c === 'HIGH' || c === 'VERY HIGH';
            }).length;
            document.getElementById('highConfidence').textContent = highConfCount;

            document.getElementById('gameFilter').addEventListener('change', () => {
                updateMatchupBanner();
                filterAndDisplay();
            });
            document.getElementById('confidenceFilter').addEventListener('change', filterAndDisplay);
            document.getElementById('betTypeFilter').addEventListener('change', filterAndDisplay);
            document.getElementById('playerSearch').addEventListener('input', filterAndDisplay);

            document.querySelectorAll('#bestBetsTable th.sortable').forEach(th => {
                th.addEventListener('click', () => onSortClick('bets', th, '#bestBetsTable'));
            });
            document.querySelectorAll('#predictionsTable th.sortable').forEach(th => {
                th.addEventListener('click', () => onSortClick('pred', th, '#predictionsTable'));
            });

            updateMatchupBanner();
            filterAndDisplay();
        } catch (error) {
            document.getElementById('bestBetsBody').innerHTML =
                `<tr><td colspan="6" class="error">Could not load data: ${escapeHtml(error.message)}</td></tr>`;
            document.getElementById('predictionsBody').innerHTML =
                `<tr><td colspan="7" class="error">Could not load data: ${escapeHtml(error.message)}</td></tr>`;
        }
    }

    function onSortClick(table, th, tableSelector) {
        const column = th.dataset.sort;
        const st = table === 'bets' ? sortBetsState : sortPredState;
        if (st.column === column) {
            st.direction = st.direction === 'asc' ? 'desc' : 'asc';
        } else {
            st.column = column;
            st.direction = 'desc';
        }
        document.querySelectorAll(`${tableSelector} th.sortable`).forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
        th.classList.add(st.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
        filterAndDisplay();
    }

    function updateMatchupBanner() {
        const v = document.getElementById('gameFilter').value;
        const banner = document.getElementById('matchupBanner');
        if (v === 'all') {
            banner.classList.remove('visible');
            banner.textContent = '';
            document.getElementById('thBetMatchup').style.display = '';
            document.getElementById('thPredMatchup').style.display = '';
            return;
        }
        const g = gamesOnSlate.find(x => String(x.game_id) === v);
        banner.textContent = g ? `Showing: ${g.matchup}` : 'Selected game';
        banner.classList.add('visible');
        document.getElementById('thBetMatchup').style.display = 'none';
        document.getElementById('thPredMatchup').style.display = 'none';
    }

    function filterByGame(items, getGameId) {
        const v = document.getElementById('gameFilter').value;
        if (v === 'all') return items;
        const gid = parseInt(v, 10);
        return items.filter(x => {
            const id = getGameId(x);
            return id != null && id === gid;
        });
    }

    function filterAndDisplay() {
        const confidenceFilter = document.getElementById('confidenceFilter').value;
        const betTypeFilter = document.getElementById('betTypeFilter').value;
        const searchTerm = document.getElementById('playerSearch').value.toLowerCase().trim();
        const gameVal = document.getElementById('gameFilter').value;
        const showMatchupCol = gameVal === 'all';

        let filteredPlayers = filterByGame(allPredictions, p => p.matchup?.game_id);
        let filteredBets = filterByGame(allBestBets, b => b.game_id);

        filteredPlayers = filteredPlayers.filter(pred => {
            const confidence = (pred.confidence || '').toLowerCase();
            const recommendation = pred.recommendation || '';
            if (confidenceFilter === 'very-high' && !confidence.includes('very high')) return false;
            if (confidenceFilter === 'high' && !confidence.includes('high')) return false;
            if (confidenceFilter === 'medium' && confidence.includes('low')) return false;
            if (betTypeFilter === 'over' && !recommendation.includes('OVER')) return false;
            if (betTypeFilter === 'under' && !recommendation.includes('UNDER')) return false;
            if (searchTerm) {
                const idMatch = pred.player_id.toString().includes(searchTerm);
                const nameMatch = (pred.player_name || '').toLowerCase().includes(searchTerm);
                const teamMatch = (pred.matchup?.team || '').toLowerCase().includes(searchTerm);
                if (!idMatch && !nameMatch && !teamMatch) return false;
            }
            return true;
        });

        filteredBets = filteredBets.filter(bet => {
            const confidence = (bet.confidence || '').toLowerCase();
            const line = bet.line || '';
            if (confidenceFilter === 'very-high' && !confidence.includes('very high')) return false;
            if (confidenceFilter === 'high' && !confidence.includes('high')) return false;
            if (confidenceFilter === 'medium' && confidence.includes('low')) return false;
            if (betTypeFilter === 'over' && !line.includes('OVER')) return false;
            if (betTypeFilter === 'under' && !line.includes('UNDER')) return false;
            if (searchTerm) {
                const idMatch = bet.player_id.toString().includes(searchTerm);
                const nameMatch = (bet.player_name || '').toLowerCase().includes(searchTerm);
                const teamMatch = (bet.team || '').toLowerCase().includes(searchTerm);
                if (!idMatch && !nameMatch && !teamMatch) return false;
            }
            return true;
        });

        filteredBets = sortBets(filteredBets, sortBetsState);
        filteredPlayers = sortPredictions(filteredPlayers, sortPredState);

        document.getElementById('totalPlayers').textContent =
            `${filteredPlayers.length}${totalPlayersInFile ? ' / ' + totalPlayersInFile : ''}`;

        displayBets(filteredBets, showMatchupCol);
        displayPredictions(filteredPlayers, showMatchupCol);
    }

    function sortBets(bets, st) {
        const col = st.column;
        const dir = st.direction === 'asc' ? 1 : -1;
        return [...bets].sort((a, b) => {
            let av, bv;
            switch (col) {
                case 'bet_matchup':
                    av = (a.matchup_label || '').toLowerCase();
                    bv = (b.matchup_label || '').toLowerCase();
                    break;
                case 'bet_player':
                    av = (a.player_name || '').toLowerCase();
                    bv = (b.player_name || '').toLowerCase();
                    break;
                case 'bet_opp':
                    av = (a.opponent || '').toLowerCase();
                    bv = (b.opponent || '').toLowerCase();
                    break;
                case 'bet_line':
                    av = `${a.prop} ${a.line}`;
                    bv = `${b.prop} ${b.line}`;
                    break;
                case 'bet_probability':
                    av = a.probability ?? 0;
                    bv = b.probability ?? 0;
                    break;
                case 'bet_confidence':
                    av = a.confidence || '';
                    bv = b.confidence || '';
                    break;
                default:
                    av = a.probability ?? 0;
                    bv = b.probability ?? 0;
            }
            if (av < bv) return -1 * dir;
            if (av > bv) return 1 * dir;
            return 0;
        });
    }

    function sortPredictions(list, st) {
        const col = st.column;
        const dir = st.direction === 'asc' ? 1 : -1;
        return [...list].sort((a, b) => {
            let av, bv;
            switch (col) {
                case 'matchup':
                    av = (a.matchup?.label || '').toLowerCase();
                    bv = (b.matchup?.label || '').toLowerCase();
                    break;
                case 'player_id':
                    av = a.player_id;
                    bv = b.player_id;
                    break;
                case 'opponent':
                    av = (a.matchup?.opponent || '').toLowerCase();
                    bv = (b.matchup?.opponent || '').toLowerCase();
                    break;
                case 'probability':
                    av = a.probability ?? 0;
                    bv = b.probability ?? 0;
                    break;
                case 'predicted_tb':
                    av = a.total_bases?.predicted ?? 0;
                    bv = b.total_bases?.predicted ?? 0;
                    break;
                case 'predicted_hits':
                    av = a.hits?.predicted ?? 0;
                    bv = b.hits?.predicted ?? 0;
                    break;
                case 'predicted_k':
                    av = a.strikeouts?.predicted ?? 0;
                    bv = b.strikeouts?.predicted ?? 0;
                    break;
                default:
                    av = a.probability ?? 0;
                    bv = b.probability ?? 0;
            }
            if (av < bv) return -1 * dir;
            if (av > bv) return 1 * dir;
            return 0;
        });
    }

    function displayBets(bets, showMatchupCol) {
        const tbody = document.getElementById('bestBetsBody');
        const nc = showMatchupCol ? 6 : 5;
        if (!bets.length) {
            tbody.innerHTML = `<tr><td colspan="${nc}" class="empty">No edges match these filters.</td></tr>`;
            return;
        }
        tbody.innerHTML = bets.map(b => {
            const pickClass = (b.line || '').includes('OVER') ? 'over' : ((b.line || '').includes('UNDER') ? 'under' : '');
            const mCol = showMatchupCol
                ? `<td class="muted col-matchup">${escapeHtml(b.matchup_label || '—')}</td>`
                : '';
            return `<tr>
                ${mCol}
                <td class="player-cell">
                    <div class="name">${escapeHtml(b.player_name || '')}</div>
                    <div class="meta">${escapeHtml(b.team || 'Team TBD')}</div>
                </td>
                <td class="hide-narrow muted">${escapeHtml(b.opponent || '—')}</td>
                <td><span class="pick ${pickClass}">${escapeHtml(b.prop)}: ${escapeHtml(b.line)}</span></td>
                <td class="prob">${(b.probability ?? 0).toFixed(1)}%</td>
                <td><span class="badge ${badgeClass(b.confidence)}">${escapeHtml(b.confidence)}</span></td>
            </tr>`;
        }).join('');
    }

    function displayPredictions(preds, showMatchupCol) {
        const tbody = document.getElementById('predictionsBody');
        const nc = showMatchupCol ? 7 : 6;
        if (!preds.length) {
            tbody.innerHTML = `<tr><td colspan="${nc}" class="empty">No players match these filters.</td></tr>`;
            return;
        }
        tbody.innerHTML = preds.map(pred => {
            const rec = pred.recommendation || '';
            const pickClass = rec.includes('OVER') ? 'over' : (rec.includes('UNDER') ? 'under' : '');
            const m = pred.matchup;
            const mCol = showMatchupCol
                ? `<td class="muted col-matchup">${escapeHtml(m?.label || '—')}</td>`
                : '';
            const tb = pred.total_bases?.predicted ?? 0;
            const hh = pred.hits?.predicted ?? 0;
            const kk = pred.strikeouts?.predicted ?? 0;
            const tbP = pred.total_bases?.probabilities?.['over_1.5'];
            const hP = pred.hits?.probabilities?.['over_0.5'];
            const kP = pred.strikeouts?.probabilities?.['over_0.5'];
            return `<tr>
                ${mCol}
                <td class="player-cell">
                    <div class="name">${escapeHtml(pred.player_name || '')}</div>
                    <div class="meta">${escapeHtml(m?.team || 'Team TBD')}</div>
                </td>
                <td class="hide-narrow muted">${escapeHtml(m?.opponent || '—')}</td>
                <td>
                    <span class="pick ${pickClass}">${escapeHtml(rec)}</span>
                    <div class="muted">${(pred.probability ?? 0).toFixed(1)}% &nbsp;·&nbsp; xwOBA ${(pred.recent_stats?.xwoba ?? 0).toFixed(3)}</div>
                </td>
                <td class="hide-narrow">${tb.toFixed(2)} <span class="muted">(${tbP != null ? tbP.toFixed(0) : '—'}%)</span></td>
                <td class="hide-narrow">${hh.toFixed(2)} <span class="muted">(${hP != null ? hP.toFixed(0) : '—'}%)</span></td>
                <td class="hide-narrow">${kk.toFixed(2)} <span class="muted">(${kP != null ? kP.toFixed(0) : '—'}%)</span></td>
            </tr>`;
        }).join('');
    }

    loadPredictions();
    </script>
</body>
